# Name and description live in strings.json / translations (services.<name>),
# which is where Home Assistant reads them from and the only way they can be
# translated. Selectors, examples and `required` stay here.
set_expert_parameter:
  fields:
    entityvalue:
      name: Entity value
      description: >-
        Hex parameter ID of YOUR installation, taken from the portal's edit
        dialog URL (entityvalue=...). Installation-specific - do not share
        publicly.
      required: true
      example: "6400000000000000000000000000000000FF"
      selector:
        text:
    value:
      name: Value
      description: New value. Must be one of the options the device offers.
      required: true
      example: 30
      selector:
        number:
          min: 0
          max: 100
          step: 1
