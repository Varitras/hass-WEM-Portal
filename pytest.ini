[pytest]
# Put the repo root on sys.path so tests can import the integration as
# `custom_components.wemportal.<module>` (custom_components is a namespace
# package - no __init__.py - so the root must be importable).
pythonpath = .
# pytest-homeassistant-custom-component uses asyncio; auto mode lets async
# tests run without a per-test marker (the current suite is sync, but this
# keeps future hass-based tests simple and matches the HA convention).
asyncio_mode = auto
testpaths = tests
