name: Test

on:
  push:
  pull_request:

# Minimal GITHUB_TOKEN scope: this workflow only checks out and runs tests,
# so read access to the repo contents is all it needs. Limiting the token
# is a supply-chain hardening best practice (flagged by CodeQL otherwise).
permissions:
  contents: read

jobs:
  pytest:
    name: pytest (real Home Assistant)
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v7"
      - name: Set up Python
        uses: "actions/setup-python@v6"
        with:
          # pytest-homeassistant-custom-component is deliberately unpinned
          # (see requirements_test.txt), so this installs the CURRENT Home
          # Assistant - which requires Python >= 3.14. An older Python here
          # would silently resolve to an outdated HA and hide exactly the
          # API removals this suite is meant to catch.
          python-version: "3.14"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
      # -m "" cancels the `-m "not e2e"` default from pytest.ini, so the slow
      # end-to-end tests against a real Home Assistant run here. Without it
      # the marker would become a silent coverage gap.
      - name: Run test suite
        run: pytest tests/ -q -m ""
