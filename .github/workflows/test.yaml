name: Test

on:
  push:
  pull_request:

jobs:
  pytest:
    name: pytest (real Home Assistant)
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v5"
      - name: Set up Python
        uses: "actions/setup-python@v6"
        with:
          # pytest-homeassistant-custom-component installs a recent Home
          # Assistant, which requires a recent Python. Bump this together
          # with the pinned HA/plugin version if a newer HA needs it.
          python-version: "3.13"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
      - name: Run test suite
        run: pytest tests/ -q
